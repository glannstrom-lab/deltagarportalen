<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Visa Landningssida</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 400px;
    }
    h1 { color: #333; margin-bottom: 10px; }
    p { color: #666; margin-bottom: 30px; }
    a {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px 40px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Jobin Landningssida</h1>
    <p>Klicka nedan for att oppna landningssidan i ett nytt fonster.</p>
    <a href="http://localhost:5173/" target="_blank">Oppna Landningssidan</a>
    <p class="note">
      Tips: Du kan ocksa oppna <code>/landing</code> direkt i webblasaren.<br>
      Eller starta dev-servern med <code>npm run dev</code>
    </p>
  </div>
</body>
</html>
