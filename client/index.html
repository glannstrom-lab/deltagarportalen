    <!-- CRITICAL: Chunk Load Error Handler - Must be inline and before any other scripts -->
    <script type="text/javascript">
      // Handle chunk load errors that happen before React loads
      (function() {
        var chunkErrorHandled = false;
        
        function handleChunkError(event) {
          if (chunkErrorHandled) return;
          
          var message = '';
          if (event.error && event.error.message) {
            message = event.error.message.toLowerCase();
          } else if (event.message) {
            message = event.message.toLowerCase();
          }
          
          // Check if this is a chunk load error
          if (message.indexOf('chunk') !== -1 ||
              message.indexOf('dynamically imported module') !== -1 ||
              message.indexOf('loading chunk') !== -1 ||
              message.indexOf('failed to fetch dynamically') !== -1 ||
              message.indexOf('imported module') !== -1) {
            
            chunkErrorHandled = true;
            
            // Prevent default error handling
            if (event.preventDefault) {
              event.preventDefault();
            }
            
            // Show reload overlay
            var overlay = document.createElement('div');
            overlay.id = 'chunk-error-overlay';
            overlay.innerHTML = '<div style="' +
              'position: fixed;' +
              'top: 0; left: 0; right: 0; bottom: 0;' +
              'background: rgba(248, 250, 252, 0.98);' +
              'z-index: 999999;' +
              'display: flex;' +
              'align-items: center;' +
              'justify-content: center;' +
              'font-family: system-ui, -apple-system, sans-serif;' +
              '">' +
              '<div style="' +
                'text-align: center;' +
                'padding: 40px;' +
                'max-width: 400px;' +
              '">' +
                '<div style="' +
                  'width: 64px;' +
                  'height: 64px;' +
                  'background: #fef3c7;' +
                  'border-radius: 50%;' +
                  'display: flex;' +
                  'align-items: center;' +
                  'justify-content: center;' +
                  'margin: 0 auto 24px;' +
                '">' +
                  '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2">' +
                    '<path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>' +
                  '</svg>' +
                '</div>' +
                '<h2 style="' +
                  'font-size: 20px;' +
                  'font-weight: 600;' +
                  'color: #1e293b;' +
                  'margin: 0 0 12px;' +
                '">Uppdatering tillgänglig</h2>' +
                '<p style="' +
                  'color: #64748b;' +
                  'margin: 0 0 24px;' +
                  'line-height: 1.5;' +
                '">Appen har uppdaterats. Ladda om sidan för att få den senaste versionen.</p>' +
                '<button onclick="window.location.reload(true)" style="' +
                  'background: #4f46e5;' +
                  'color: white;' +
                  'border: none;' +
                  'padding: 12px 24px;' +
                  'border-radius: 8px;' +
                  'font-size: 16px;' +
                  'font-weight: 500;' +
                  'cursor: pointer;' +
                '">Ladda om sidan</button>' +
              '</div>' +
            '</div>';
            
            // Append to body when ready
            if (document.body) {
              document.body.appendChild(overlay);
            } else {
              document.addEventListener('DOMContentLoaded', function() {
                document.body.appendChild(overlay);
              });
            }
            
            // Auto-reload after 3 seconds if user hasn't interacted
            setTimeout(function() {
              if (!window.__userReloaded) {
                window.location.reload(true);
              }
            }, 3000);
            
            return false;
          }
        }
        
        // Listen for errors
        window.addEventListener('error', handleChunkError, true);
        
        // Listen for unhandled promise rejections
        window.addEventListener('unhandledrejection', function(event) {
          var reason = event.reason;
          if (reason && reason.message) {
            handleChunkError({ 
              error: reason, 
              message: reason.message,
              preventDefault: function() { event.preventDefault(); }
            });
          }
        }, true);
      })();
    </script>
    
    <!-- Start Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <!-- End Single Page Apps for GitHub Pages -->
