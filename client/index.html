<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-icon.png" />
    <link rel="apple-touch-icon" href="/logo-jobin.png" />
    <meta name="apple-mobile-web-app-title" content="Jobin" />
    <meta name="application-name" content="Jobin" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Deltagarportalen - Stöd för arbetssökande med verktyg för CV, jobbsök och karriärutveckling">
    <meta name="theme-color" content="#4f46e5">
    
    <!-- Security Headers (Note: frame-ancestors and X-Frame-Options must be set via HTTP headers, not meta tags) -->
    <!-- CSP: 'wasm-unsafe-eval' krävs av @react-pdf/renderer (yoga-layout kompilerar WASM).
         data: i connect-src krävs av samma — WASM:en hämtas som data: URL.
         frame-ancestors flyttat till HTTP-header (vercel.json) eftersom <meta> ignorerar det. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://translate.google.com https://*.googleapis.com https://*.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob: https://*.public.blob.vercel-storage.com https://www.google.com https://translate.google.com https://*.gstatic.com; connect-src 'self' data: https://*.supabase.co https://*.arbetsformedlingen.se https://jobsearch.api.jobtechdev.se wss://*.supabase.co https://*.public.blob.vercel-storage.com https://*.googleapis.com; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-XSS-Protection" content="0">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()">
    
    <!-- Cache Control - Force refresh on new deployments -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="build-timestamp" content="2026-04-09">
    
    <title>Deltagarportalen - Stöd för arbetssökande</title>
    
    <!-- Preconnect to critical domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Build timestamp: 2026-04-09 -->

    <!-- Clear broken service workers -->
    <script type="text/javascript">
      (function() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            registrations.forEach(function(registration) {
              registration.unregister();
            });
          });
          if ('caches' in window) {
            caches.keys().then(function(names) {
              names.forEach(function(name) { caches.delete(name); });
            });
          }
        }
      })();
    </script>

    <!-- Chunk Load Error Handler - Must be inline and before any other scripts -->
    <script type="text/javascript">
      // Handle chunk load errors that happen before React loads
      (function() {
        var chunkErrorHandled = false;
        
        function handleChunkError(event) {
          if (chunkErrorHandled) return;
          
          var message = '';
          if (event.error && event.error.message) {
            message = event.error.message.toLowerCase();
          } else if (event.message) {
            message = event.message.toLowerCase();
          }
          
          // Check if this is a chunk load error
          if (message.indexOf('chunk') !== -1 ||
              message.indexOf('dynamically imported module') !== -1 ||
              message.indexOf('loading chunk') !== -1 ||
              message.indexOf('failed to fetch dynamically') !== -1 ||
              message.indexOf('imported module') !== -1) {
            
            chunkErrorHandled = true;
            
            // Prevent default error handling
            if (event.preventDefault) {
              event.preventDefault();
            }
            
            // Show reload overlay
            var overlay = document.createElement('div');
            overlay.id = 'chunk-error-overlay';
            overlay.innerHTML = '<div style="' +
              'position: fixed;' +
              'top: 0; left: 0; right: 0; bottom: 0;' +
              'background: rgba(248, 250, 252, 0.98);' +
              'z-index: 999999;' +
              'display: flex;' +
              'align-items: center;' +
              'justify-content: center;' +
              'font-family: system-ui, -apple-system, sans-serif;' +
              '">' +
              '<div style="' +
                'text-align: center;' +
                'padding: 40px;' +
                'max-width: 400px;' +
              '">' +
                '<div style="' +
                  'width: 64px;' +
                  'height: 64px;' +
                  'background: #fef3c7;' +
                  'border-radius: 50%;' +
                  'display: flex;' +
                  'align-items: center;' +
                  'justify-content: center;' +
                  'margin: 0 auto 24px;' +
                '">' +
                  '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2">' +
                    '<path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>' +
                  '</svg>' +
                '</div>' +
                '<h2 style="' +
                  'font-size: 20px;' +
                  'font-weight: 600;' +
                  'color: #1e293b;' +
                  'margin: 0 0 12px;' +
                '">Uppdatering tillgänglig</h2>' +
                '<p style="' +
                  'color: #64748b;' +
                  'margin: 0 0 24px;' +
                  'line-height: 1.5;' +
                '">Appen har uppdaterats. Ladda om sidan för att få den senaste versionen.</p>' +
                '<button onclick="window.location.reload(true)" style="' +
                  'background: #4f46e5;' +
                  'color: white;' +
                  'border: none;' +
                  'padding: 12px 24px;' +
                  'border-radius: 8px;' +
                  'font-size: 16px;' +
                  'font-weight: 500;' +
                  'cursor: pointer;' +
                '">Ladda om sidan</button>' +
              '</div>' +
            '</div>';
            
            // Append to body when ready
            if (document.body) {
              document.body.appendChild(overlay);
            } else {
              document.addEventListener('DOMContentLoaded', function() {
                document.body.appendChild(overlay);
              });
            }
            
            // Auto-reload after 3 seconds if user hasn't interacted
            setTimeout(function() {
              if (!window.__userReloaded) {
                window.location.reload(true);
              }
            }, 3000);
            
            return false;
          }
        }
        
        // Listen for errors
        window.addEventListener('error', handleChunkError, true);
        
        // Listen for unhandled promise rejections
        window.addEventListener('unhandledrejection', function(event) {
          var reason = event.reason;
          if (reason && reason.message) {
            handleChunkError({ 
              error: reason, 
              message: reason.message,
              preventDefault: function() { event.preventDefault(); }
            });
          }
        }, true);
      })();
    </script>
    
    <!-- Force clear old service workers on version mismatch -->
    <script type="text/javascript">
      (function() {
        const CURRENT_VERSION = 'v3';
        const storedVersion = localStorage.getItem('app-version');
        
        if (storedVersion !== CURRENT_VERSION) {
          // Unregister all service workers
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              registrations.forEach(function(registration) {
                registration.unregister();
                console.log('[App] Unregistered old service worker');
              });
              // Clear all caches
              if ('caches' in window) {
                caches.keys().then(function(cacheNames) {
                  cacheNames.forEach(function(cacheName) {
                    caches.delete(cacheName);
                    console.log('[App] Deleted cache:', cacheName);
                  });
                });
              }
              // Store new version and reload
              localStorage.setItem('app-version', CURRENT_VERSION);
              console.log('[App] Updated to version:', CURRENT_VERSION);
            });
          } else {
            localStorage.setItem('app-version', CURRENT_VERSION);
          }
        }
      })();
    </script>
    
    <!-- Start Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <!-- End Single Page Apps for GitHub Pages -->
  </head>
  <body>
    <div id="root">
      <!-- Fallback loading UI - will be replaced when React mounts -->
      <div id="initial-loader" style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: system-ui, -apple-system, sans-serif;
        background: #f8fafc;
      ">
        <div style="
          width: 48px;
          height: 48px;
          border: 3px solid #e2e8f0;
          border-top-color: #4f46e5;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        "></div>
        <p style="margin-top: 16px; color: #64748b; font-size: 14px;">Laddar Jobin...</p>
      </div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
