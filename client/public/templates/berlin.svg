<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 420" width="320" height="420" role="img" aria-label="Berlin CV-mall förhandsvisning">
  <defs>
    <style>
      .ink { fill: #1A1A1A; }
      .cream { fill: #F4EDE0; }
      .accent { fill: #C8392E; }
      .muted { fill: #5A5A5A; }
      text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>
  <!-- Bakgrund -->
  <rect width="320" height="420" class="cream"/>

  <!-- Vänster mörk sidobar -->
  <rect x="0" y="0" width="32" height="420" class="ink"/>
  <!-- Initialer-ruta i sidobar -->
  <rect x="6" y="22" width="20" height="20" fill="none" stroke="#F4EDE0" stroke-width="1"/>
  <text x="16" y="36" text-anchor="middle" font-size="9" font-weight="800" fill="#F4EDE0">AL</text>
  <!-- Vertikal etikett (faked som 4 prickar) -->
  <circle cx="16" cy="120" r="1.4" fill="#F4EDE0" opacity="0.7"/>
  <circle cx="16" cy="135" r="1.4" fill="#F4EDE0" opacity="0.7"/>
  <circle cx="16" cy="150" r="1.4" fill="#F4EDE0" opacity="0.7"/>
  <circle cx="16" cy="165" r="1.4" fill="#F4EDE0" opacity="0.7"/>
  <!-- Röd kvadrat i botten av sidobar -->
  <rect x="10" y="385" width="12" height="12" class="accent"/>

  <!-- Header: kategori-etikett -->
  <text x="56" y="40" font-size="7" font-weight="700" letter-spacing="2" class="accent">◼ PROJEKTLEDARE</text>

  <!-- Stort namn (delat på två rader för layout) -->
  <text x="56" y="74" font-size="22" font-weight="900" class="ink" letter-spacing="-0.5">ANNA</text>
  <text x="56" y="98" font-size="22" font-weight="900" class="ink" letter-spacing="-0.5">LINDQVIST</text>

  <!-- Kontakt-rad med tunn linje ovanför -->
  <line x1="56" y1="112" x2="296" y2="112" stroke="#1A1A1A" stroke-width="0.5"/>
  <text x="56" y="124" font-size="6" class="muted">anna@x.se · 070-123 · Stockholm</text>

  <!-- Sektion I: Profil -->
  <line x1="56" y1="148" x2="296" y2="148" stroke="#1A1A1A" stroke-width="1.2"/>
  <text x="56" y="143" font-size="7" font-weight="800" class="accent" font-family="Georgia, serif">I</text>
  <text x="76" y="143" font-size="8" font-weight="900" class="ink" letter-spacing="0.5">PROFIL</text>
  <rect x="56" y="156" width="220" height="2" fill="#1A1A1A" opacity="0.08"/>
  <rect x="56" y="162" width="200" height="2" fill="#1A1A1A" opacity="0.08"/>
  <rect x="56" y="168" width="180" height="2" fill="#1A1A1A" opacity="0.08"/>

  <!-- Sektion II: Erfarenhet -->
  <line x1="56" y1="200" x2="296" y2="200" stroke="#1A1A1A" stroke-width="1.2"/>
  <text x="56" y="195" font-size="7" font-weight="800" class="accent" font-family="Georgia, serif">II</text>
  <text x="76" y="195" font-size="8" font-weight="900" class="ink" letter-spacing="0.5">ERFARENHET</text>
  <!-- Job entry 1 -->
  <text x="56" y="216" font-size="6" font-weight="700" class="accent" letter-spacing="0.5">2022</text>
  <text x="56" y="223" font-size="6" font-weight="700" class="muted">—</text>
  <text x="56" y="230" font-size="6" font-weight="700" class="accent" letter-spacing="0.5">NU</text>
  <text x="100" y="216" font-size="9" font-weight="800" class="ink">Projektledare</text>
  <text x="100" y="225" font-size="6" font-weight="600" class="muted" letter-spacing="0.5">TECH AB · STOCKHOLM</text>
  <rect x="100" y="231" width="180" height="1.5" fill="#1A1A1A" opacity="0.08"/>
  <rect x="100" y="236" width="160" height="1.5" fill="#1A1A1A" opacity="0.08"/>
  <line x1="56" y1="246" x2="296" y2="246" stroke="#1A1A1A" stroke-width="0.5" opacity="0.2"/>
  <!-- Job entry 2 -->
  <text x="56" y="262" font-size="6" font-weight="700" class="accent" letter-spacing="0.5">2018</text>
  <text x="56" y="269" font-size="6" font-weight="700" class="muted">—</text>
  <text x="56" y="276" font-size="6" font-weight="700" class="accent" letter-spacing="0.5">2022</text>
  <text x="100" y="262" font-size="9" font-weight="800" class="ink">UX-designer</text>
  <text x="100" y="271" font-size="6" font-weight="600" class="muted" letter-spacing="0.5">DESIGN STUDIO</text>

  <!-- Sektion III: Kompetenser -->
  <line x1="56" y1="304" x2="296" y2="304" stroke="#1A1A1A" stroke-width="1.2"/>
  <text x="56" y="299" font-size="7" font-weight="800" class="accent" font-family="Georgia, serif">III</text>
  <text x="76" y="299" font-size="8" font-weight="900" class="ink" letter-spacing="0.5">KOMPETENSER</text>
  <!-- Skill chips med tunn ram -->
  <rect x="56" y="312" width="40" height="14" fill="none" stroke="#1A1A1A" stroke-width="0.6"/>
  <text x="76" y="322" text-anchor="middle" font-size="5" font-weight="600" class="ink" letter-spacing="0.5">FIGMA</text>
  <rect x="100" y="312" width="44" height="14" fill="none" stroke="#1A1A1A" stroke-width="0.6"/>
  <text x="122" y="322" text-anchor="middle" font-size="5" font-weight="600" class="ink" letter-spacing="0.5">REACT</text>
  <rect x="148" y="312" width="48" height="14" fill="none" stroke="#1A1A1A" stroke-width="0.6"/>
  <text x="172" y="322" text-anchor="middle" font-size="5" font-weight="600" class="ink" letter-spacing="0.5">AGILE</text>
  <rect x="200" y="312" width="56" height="14" fill="none" stroke="#1A1A1A" stroke-width="0.6"/>
  <text x="228" y="322" text-anchor="middle" font-size="5" font-weight="600" class="ink" letter-spacing="0.5">RESEARCH</text>

  <!-- Sektion IV: Språk -->
  <line x1="56" y1="354" x2="296" y2="354" stroke="#1A1A1A" stroke-width="1.2"/>
  <text x="56" y="349" font-size="7" font-weight="800" class="accent" font-family="Georgia, serif">IV</text>
  <text x="76" y="349" font-size="8" font-weight="900" class="ink" letter-spacing="0.5">SPRÅK</text>
  <text x="56" y="370" font-size="8" font-weight="800" class="ink">Svenska</text>
  <text x="56" y="380" font-size="6" font-weight="700" class="accent" letter-spacing="1">MODERSMÅL</text>
  <text x="160" y="370" font-size="8" font-weight="800" class="ink">Engelska</text>
  <text x="160" y="380" font-size="6" font-weight="700" class="accent" letter-spacing="1">FLYTANDE</text>
</svg>
