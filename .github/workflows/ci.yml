name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# D8 (2026-07-23): avbryt föregående körning vid snabba på-varandra-följande
# pushar till samma branch/PR — sparar CI-minuter och kortar kön.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Run ESLint
        working-directory: client
        run: npm run lint

      - name: Type check (crash-class)
        working-directory: client
        run: npm run typecheck:critical

      - name: Design debt — gradient regression guard
        working-directory: client
        run: npm run lint:design

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Run tests with coverage
        working-directory: client
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: client/coverage
          retention-days: 30

      - name: Coverage summary in PR
        if: github.event_name == 'pull_request'
        working-directory: client
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              console.log('| Metric | % |');
              console.log('|--------|---|');
              console.log('| Lines | ' + s.lines.pct + '% |');
              console.log('| Functions | ' + s.functions.pct + '% |');
              console.log('| Branches | ' + s.branches.pct + '% |');
              console.log('| Statements | ' + s.statements.pct + '% |');
            " >> $GITHUB_STEP_SUMMARY
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build application
        working-directory: client
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: client/dist
          retention-days: 7

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: client/dist

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Run Lighthouse CI
        # D6 (2026-07-10): LCP-budget 2500 ms som warn. Baseline mot prod
        # 2026-07-10: landning ~340 ms, inloggad översikt ~1400 ms (median,
        # e2e/lcp-baseline.cjs). Skärp till error när CI-variansen är känd.
        run: |
          lhci autorun \
            --collect.staticDistDir=./client/dist \
            --collect.numberOfRuns=3 \
            --assert.preset=lighthouse:recommended \
            --assert.assertions.categories:performance=off \
            --assert.assertions.largest-contentful-paint="warn:{\"maxNumericValue\":2500}" \
            --assert.assertions.categories:accessibility=warn \
            --assert.assertions.categories:best-practices=warn \
            --assert.assertions.categories:seo=warn \
            --upload.target=temporary-public-storage
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: .lighthouseci
          retention-days: 30

  e2e-smoke:
    name: E2E Smoke (public pages)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install root dependencies (Playwright)
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        # D8 (2026-07-23): regression-fas-a tillagd — låg i repot men kördes
        # aldrig i CI (publika vakter: modulepreload, upload-image-auth, routes)
        run: npx playwright test e2e/smoke.spec.ts e2e/regression-fas-a.spec.ts --project=chromium
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  # D1 (2026-07-10): Authenticated E2E. Specarna själv-skippar när
  # TEST_USER_EMAIL saknas — jobbet är alltså grönt-men-tomt tills
  # secrets TEST_USER_EMAIL/TEST_USER_PASSWORD (och valfritt
  # TEST_CONSULTANT_EMAIL/TEST_CONSULTANT_PASSWORD) läggs in i repot.
  e2e-authenticated:
    name: E2E Authenticated (golden path)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install root dependencies (Playwright)
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run authenticated E2E
        # D8 (2026-07-23): axe-a11y tillagd — WCAG-svepet kördes aldrig i CI.
        # Publika sidor auditeras alltid; inloggade sidor när secrets finns.
        # D9 (2026-07-23): sta.spec.ts tillagd — STA/Arbetsprövning (en av de
        # fyra huvudfunktionerna) hade ingen e2e-täckning alls.
        run: npx playwright test e2e/golden-path.spec.ts e2e/auth.spec.ts e2e/cv.spec.ts e2e/dashboard.spec.ts e2e/cover-letter.spec.ts e2e/job-search.spec.ts e2e/axe-a11y.spec.ts e2e/sta.spec.ts --project=chromium
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_CONSULTANT_EMAIL: ${{ secrets.TEST_CONSULTANT_EMAIL }}
          TEST_CONSULTANT_PASSWORD: ${{ secrets.TEST_CONSULTANT_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-authenticated
          path: playwright-report
          retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      # Riktig gate sedan 2026-07-23 (A14 klar: @vercel/blob@2.6.1 → 0 prod-
      # sårbarheter). --omit=dev är medvetet: dev-beroenden skeppas inte
      # (@vercel/node pinnar t.ex. fortfarande en gammal undici som Vercel
      # måste släppa fix för — den ska inte fälla CI).
      - name: Run npm audit (production dependencies)
        working-directory: client
        run: npm audit --omit=dev --audit-level=high

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
